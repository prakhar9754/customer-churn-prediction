<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Customer Churn Prediction</title>

<!-- Bootstrap Dark Theme -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

.container-box{
background:#1e293b;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.btn-custom{
background:#3b82f6;
border:none;
}

.btn-custom:hover{
background:#2563eb;
}

.result-box{
margin-top:20px;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6 container-box">

<h2 class="text-center mb-4">📊 Customer Churn Prediction</h2>

<form method="POST">

<div class="mb-3">
<label class="form-label">Recency (Days since last purchase)</label>
<input type="number" class="form-control" name="recency" required>
</div>

<div class="mb-3">
<label class="form-label">Number of Orders</label>
<input type="number" class="form-control" name="frequency" required>
</div>

<div class="mb-3">
<label class="form-label">Total Spend</label>
<input type="number" step="0.01" class="form-control" name="monetary" required>
</div>

<div class="mb-3">
<label class="form-label">Average Order Value</label>
<input type="number" step="0.01" class="form-control" name="avg_order_value" required>
</div>

<div class="mb-3">
<label class="form-label">Average Review Score</label>
<input type="number" step="0.1" min="1" max="5" class="form-control" name="avg_review_score" required>
</div>

<div class="d-grid">
<button class="btn btn-custom btn-lg">Predict Churn</button>
</div>

</form>

{% if prediction is not none %}

<div class="result-box text-center
{% if prediction == 1 %}
bg-danger
{% else %}
bg-success
{% endif %}
">

<h4>Churn Probability: {{ "%.2f"|format(probability) }}</h4>

{% if prediction == 1 %}
<p>⚠️ Customer likely to churn</p>
{% else %}
<p>✅ Customer likely to stay</p>
{% endif %}

</div>

{% endif %}

</div>

</div>

</div>

</body>
</html>
